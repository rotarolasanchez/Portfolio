name: iOS Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  build-ios:
    name: Build iOS Framework
    runs-on: macos-14  # Mac con Apple Silicon (M1) - gratis en GitHub Actions

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install google-services.json (from secret)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
            echo "✅ google-services.json instalado"
          else
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 no configurado, continuando sin él (solo módulo shared)"
          fi

      - name: Inyectar FIREBASE_WEB_API_KEY en local.properties
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
        run: |
          if [ -n "$FIREBASE_WEB_API_KEY" ]; then
            echo "FIREBASE_WEB_API_KEY=$FIREBASE_WEB_API_KEY" >> local.properties
            echo "✅ FIREBASE_WEB_API_KEY inyectado en local.properties"
          else
            echo "⚠️  FIREBASE_WEB_API_KEY no configurado — iOS usará modo fallback"
          fi

      - name: Dar permisos de ejecución a gradlew
        run: chmod +x gradlew

      - name: Compilar framework iOS (Simulator M1)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Compilar framework iOS (Dispositivo ARM64)
        run: ./gradlew :shared:linkDebugFrameworkIosArm64 --no-daemon

      - name: Verificar framework generado
        run: |
          echo "=== Frameworks generados ==="
          ls -la shared/build/bin/iosSimulatorArm64/debugFramework/ || echo "No encontrado"
          ls -la shared/build/bin/iosArm64/debugFramework/ || echo "No encontrado"

      - name: Build app iOS con Xcode
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            FRAMEWORK_SEARCH_PATHS="$(pwd)/shared/build/bin/iosSimulatorArm64/debugFramework" \
            build \
            | xcpretty || true

      - name: Subir framework como artefacto
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ios-framework-debug
          path: shared/build/bin/
          retention-days: 7

      - name: Clean sensitive files
        if: ${{ always() }}
        run: |
          rm -f app/google-services.json
