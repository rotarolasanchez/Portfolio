name: 🤖 Android CI - Build Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: 🔨 Compile Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔑 Create local.properties with dummy keys
        run: |
          echo "GEMINI_API_KEY=dummy_key_for_ci" >> local.properties
          echo "MODEL_NAME=gemini-pro" >> local.properties

      - name: 🔧 Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: ✅ Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 🧪 Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7
