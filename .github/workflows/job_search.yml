name: 🤖 Daily Job Search — Android Senior

on:
  schedule:
    # Every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  search-and-notify:
    name: Search jobs and send email report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run job search script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python .github/scripts/job_search.py
