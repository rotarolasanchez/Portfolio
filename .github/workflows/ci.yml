  instrumentation-test:
      if: contains(github.event.head_commit.message, 'Send QA')
      #needs: [ unit-test ]
      runs-on: ubuntu-latest
      strategy:
        matrix:
          api-level: [ 29 ]
      steps:
        - name: Checkout the code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'gradle'

        - name: Install google-services.json (from secret)
          env:
            GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          run: |
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

        - name: Grant execute permission for gradlew
          run: chmod +x ./gradlew

        - name: Enable KVM (acelera el emulador Android)
          run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

        - name: Run espresso tests
          uses: reactivecircus/android-emulator-runner@v2
          with:
            api-level: 29
            target: default
            arch: x86_64
            profile: Nexus 6
            emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
            disable-animations: true
            script: ./gradlew connectedCheck --build-cache --stacktrace

        - name: Upload test report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: instrumentation_test_report
            path: app/build/reports/androidTests/connected/

        - name: Clean sensitive files
          if: ${{ always() }}
          run: rm -f app/google-services.json

  sonarcloud:
      needs: [ instrumentation-test ]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout the code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'gradle'

        - name: Install google-services.json (from secret)
          env:
            GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          run: |
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

        - name: Grant execute permission for gradlew
          run: chmod +x ./gradlew

        - name: Build debug + coverage only (avoid release signing in CI)
          run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport :app:assembleDebug --parallel --build-cache

        - name: Check SonarQube availability (retry)
          id: sonar_health
          env:
            SONAR_HOST_URL: https://sonarqube.capibarafamily.online
          run: |
            reachable=false
            for i in 1 2 3 4 5; do
              echo "SonarQube health check attempt $i/5..."
              if curl -fsS --connect-timeout 10 --max-time 20 "$SONAR_HOST_URL/api/system/status" > /dev/null; then
                reachable=true
                break
              fi
              sleep 8
            done
            echo "reachable=$reachable" >> "$GITHUB_OUTPUT"

        - name: SonarQube unavailable notice
          if: steps.sonar_health.outputs.reachable != 'true'
          run: echo "SonarQube server is unreachable from this runner. Skipping sonar scan and quality gate for this run."

        - name: SonarCloud Scan
          if: steps.sonar_health.outputs.reachable == 'true'
          run: ./gradlew app:sonar -Dsonar.login=${{ secrets.SONAR_TOKEN }} -Dsonar.gradle.skipCompile=true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Upload coverage report
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report
            path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

        - name: Upload APK for Firebase distribution
          uses: actions/upload-artifact@v4
          with:
            name: app-debug-apk
            path: app/build/outputs/apk/debug/app-debug.apk
            retention-days: 1

        - name: Check SonarQube Quality Gate
          if: steps.sonar_health.outputs.reachable == 'true'
          run: |
            status=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "https://sonarqube.capibarafamily.online/api/qualitygates/project_status?projectKey=Portfolio_kotlin&branch=main" | jq -r '.projectStatus.status')
            if [ "$status" != "OK" ]; then
              echo "Quality gate failed: $status"
              exit 1
            fi
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        - name: Clean sensitive files
          if: ${{ always() }}
          run: rm -f app/google-services.json

  Firebase:
      needs: [ sonarcloud ]
      runs-on: ubuntu-latest
      steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode service account key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > firebase-key.json

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --groups "qa" \
            --release-notes "Versión enviada desde CI automáticamente."

      - name: Clean up
        if: always()
        run: |
          rm -f firebase-key.json
