  instrumentation-test:
      if: contains(github.event.head_commit.message, 'Send QA')
      #needs: [ unit-test ]
      runs-on: ubuntu-latest
      strategy:
        matrix:
          api-level: [ 29 ]
      steps:
        - name: Checkout the code
          uses: actions/checkout@v2

        - name: Set up JDK 17
          uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Install google-services.json (from secret)
          env:
            GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          run: |
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

        - name: Grant execute permission for gradlew
          run: chmod +x ./gradlew

        - name: Run espresso tests
          uses: reactivecircus/android-emulator-runner@v2
          with:
            api-level: 29 # Usa API 29 para mejor compatibilidad
            target: default
            arch: x86_64
            profile: Nexus 6
            emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
            disable-animations: true
            script: ./gradlew connectedCheck --stacktrace

        - name: Upload test report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: instrumentation_test_report
            path: app/build/reports/androidTests/connected/

        - name: Clean sensitive files
          if: ${{ always() }}
          run: rm -f app/google-services.json
  sonarcloud:
      needs: [ instrumentation-test ]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout the code
          uses: actions/checkout@v3
          with:
            fetch-depth: 0

        - name: Set up JDK 17
          uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Install google-services.json (from secret)
          env:
            GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          run: |
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

        - name: Grant execute permission for gradlew
          run: chmod +x ./gradlew

        - name: Cache Gradle packages
          uses: actions/cache@v3
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
            restore-keys: |
              ${{ runner.os }}-gradle
        - name: Build and run tests with coverage
          run: ./gradlew clean build jacocoTestReport

        - name: SonarCloud Scan
          run: ./gradlew app:sonar -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        - name: Upload coverage report
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report
            path: build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

        - name: Check SonarQube Quality Gate
          run: |
            status=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "https://sonarqube.capibarafamily.online/api/qualitygates/project_status?projectKey=Portfolio_kotlin&branch=main" | jq -r '.projectStatus.status')
            if [ "$status" != "OK" ]; then
              echo "Quality gate failed: $status"
              exit 1
            fi
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

        - name: Clean sensitive files
          if: ${{ always() }}
          run: rm -f app/google-services.json
  Firebase:
      needs: [ sonarcloud ]
      runs-on: ubuntu-latest
      steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install google-services.json (from secret)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build APK again
        run: ./gradlew assembleDebug

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode service account key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > firebase-key.json

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --groups "qa" \
            --release-notes "Versión enviada desde CI automáticamente."

      - name: Clean up
        if: always()
        run: |
          rm -f firebase-key.json
          rm -f app/google-services.json
