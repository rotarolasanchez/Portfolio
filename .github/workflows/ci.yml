  sonar:
      if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release/')
      #needs: [ instrumentation-test ]
      runs-on: ubuntu-latest
      steps:
        - name: Checkout the code
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: 'gradle'

        - name: Install google-services.json (from secret)
          env:
            GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          run: |
            echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

        - name: Grant execute permission for gradlew
          run: chmod +x ./gradlew

        - name: Build debug + coverage only (avoid release signing in CI)
          run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport :app:assembleDebug --parallel --build-cache

        - name: Check SonarQube availability (self-hosted)
          env:
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          run: |
            if [ -z "$SONAR_HOST_URL" ]; then
              echo "❌ Falta el secret SONAR_HOST_URL"
              exit 1
            fi
            for i in 1 2 3 4 5; do
              echo "SonarQube health check $i/5 -> $SONAR_HOST_URL"
              if curl -fsS --connect-timeout 10 --max-time 20 "$SONAR_HOST_URL/api/system/status" > /dev/null; then
                echo "✓ SonarQube reachable"
                exit 0
              fi
              sleep 8
            done
            echo "❌ SonarQube unreachable from GitHub runner"
            exit 1

        - name: SonarQube Scan (self-hosted)
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: |
            ./gradlew app:sonar \
              -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
              -Dsonar.projectKey=Portfolio_kotlin \
              -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.gradle.skipCompile=true \
              --no-daemon

        - name: Check SonarQube Quality Gate
          env:
            SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          run: |
            # SonarQube CE no soporta branch analysis -> no usar &branch=
            # Esperamos más tiempo para que el procesamiento del scan termine
            echo "⏳ Esperando que SonarQube procese el análisis..."
            sleep 20

            QG_URL="${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=Portfolio_kotlin"
            echo "Consultando: $QG_URL"

            # Capturar respuesta completa para debug
            RESPONSE=$(curl -s \
              --user "${SONAR_TOKEN}:" \
              --header "Accept: application/json" \
              --connect-timeout 15 \
              --max-time 30 \
              "$QG_URL")

            echo "Respuesta raw: $RESPONSE"

            # Verificar que la respuesta es JSON válido
            if ! echo "$RESPONSE" | jq . > /dev/null 2>&1; then
              echo "❌ La respuesta no es JSON válido (¿Cloudflare challenge?)"
              echo "Respuesta recibida: $RESPONSE"
              exit 1
            fi

            status=$(echo "$RESPONSE" | jq -r '.projectStatus.status // "NULL"')
            echo "Quality gate status: $status"

            if [ "$status" = "OK" ]; then
              echo "✓ Quality gate passed"
            elif [ "$status" = "NONE" ] || [ "$status" = "NULL" ]; then
              echo "⚠️ Quality gate sin datos aún (primer análisis o sin cobertura configurada) — continuando"
            else
              echo "❌ Quality gate failed: $status"
              exit 1
            fi

        - name: Upload coverage report
          uses: actions/upload-artifact@v4
          with:
            name: coverage-report
            path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

        - name: Upload APK for Firebase distribution
          uses: actions/upload-artifact@v4
          with:
            name: app-debug-apk
            path: app/build/outputs/apk/debug/app-debug.apk
            retention-days: 1


        - name: Clean sensitive files
          if: ${{ always() }}
          run: rm -f app/google-services.json

  Firebase:
      needs: [ sonar ]
      runs-on: ubuntu-latest
      steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode service account key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > firebase-key.json

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --groups "qa" \
            --release-notes "Versión enviada desde CI automáticamente."

      - name: Clean up
        if: always()
        run: |
          rm -f firebase-key.json
