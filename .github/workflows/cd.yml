name: CD
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install keystore and keystore.properties
        env:
          KEYSTORE_PROPERTIES_BASE64: ${{ secrets.KEYSTORE_PROPERTIES }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PROPERTIES_PATH=app/keystore.properties
          echo -n "$KEYSTORE_PROPERTIES_BASE64" | base64 -d > $KEYSTORE_PROPERTIES_PATH

          mkdir -p app/key
          KEYSTORE_PATH=app/key/key.jks
          echo -n "$KEYSTORE_BASE64" | base64 -d > $KEYSTORE_PATH

          ls $RUNNER_TEMP

      - name: Install google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo -n "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Create local.properties with API keys
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          GEMINI_API_KEY=${GEMINI_API_KEY}
          MODEL_NAME=${MODEL_NAME}
          EOF

      - name: Create Firebase Web config (from secret)
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          cat > shared/src/wasmJsMain/resources/firebase-config.js << EOF
          window.__FIREBASE_CONFIG__ = {
              apiKey: "${FIREBASE_WEB_API_KEY}",
              authDomain: "${FIREBASE_PROJECT_ID}.firebaseapp.com",
              projectId: "${FIREBASE_PROJECT_ID}",
              storageBucket: "${FIREBASE_PROJECT_ID}.firebasestorage.app"
          };
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js (required for wasmJs)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AAB
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Publish to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1.0.19
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.rotarola.portafolio_kotlin
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal        # ✅ Sube a internal primero para validar, luego promover manualmente a production
          status: completed
          inAppUpdatePriority: 2

      - name: Clean sensitive files
        if: ${{ always() }}
        run: |
          rm -f app/keystore.properties
          rm -f app/key/key.jks
          rm -f app/google-services.json
          rm -f local.properties
          rm -f shared/src/wasmJsMain/resources/firebase-config.js
